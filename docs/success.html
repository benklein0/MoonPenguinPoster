<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — The Moon Penguin Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --cream: #f5f0e8; --warm-white: #faf7f2; --gold: #c9a96e; --dark: #1a1612; --mid: #5c4f3d; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--warm-white); color: var(--dark); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    .check { font-size: 3rem; margin-bottom: 24px; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; margin-bottom: 16px; text-align: center; }
    h1 em { font-style: italic; color: var(--gold); }
    p { font-size: 0.95rem; line-height: 1.8; color: var(--mid); text-align: center; max-width: 480px; margin-bottom: 12px; }
    .divider { width: 48px; height: 1px; background: var(--gold); margin: 32px auto; }
    .btn { display: inline-block; background: var(--dark); color: var(--cream); padding: 14px 36px; font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; margin-top: 16px; transition: background 0.3s; }
    .btn:hover { background: var(--gold); color: var(--dark); }
  </style>
</head>
<body>
  <div class="check">🎉</div>
  <h1>Thank you for your <em>order!</em></h1>
  <p>Your handmade piece is on its way. You'll receive a confirmation email shortly with your order details.</p>
  <p>Camilla will personally pack and ship your item from Westport, CT with care.</p>
  <div class="divider"></div>
  <p style="font-size:0.82rem;">Questions? Email us at <a href="mailto:themoonpenguinshop@gmail.com" style="color:var(--gold);">themoonpenguinshop@gmail.com</a></p>
  <a href="/shop.html" class="btn">Continue Shopping</a>
</body>
</html>
